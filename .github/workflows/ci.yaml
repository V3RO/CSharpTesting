name: .NET CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Setup
        uses: ./.github/actions/dotnet-setup
        
      - name: Build Solution
        run: dotnet build CSharpTesting.slnx --configuration Release --no-restore
  
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/dotnet-setup
        
      - name: Test Exploration
        run: dotnet test Exploration.Tests/Exploration.Tests.csproj --configuration Release --no-restore --verbosity normal
        
      - name: Test Bowling
        run: dotnet test Bowling.Tests/Bowling.Tests.csproj --configuration Release --no-restore --verbosity normal
        
      - name: Test ConnectFour
        run: dotnet test ConnectFour.Tests/ConnectFour.Tests.csproj --configuration Release --no-restore --verbosity normal
        
  format:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/dotnet-setup
        
      - name: Format
        run: dotnet format CSharpTesting.slnx --verify-no-changes --no-restore
        continue-on-error: true