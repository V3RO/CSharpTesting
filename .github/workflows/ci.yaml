name: .NET CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Setup
        uses: ./.github/actions/dotnet-setup
        
      - name: Build Solution
        run: dotnet build CSharpTesting.slnx --configuration Release --no-restore
  
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/dotnet-setup
        
      - name: Test Exploration
        run: dotnet test Exploration.Tests/Exploration.Tests.csproj --configuration Release --no-restore --verbosity normal
        
      - name: Test Bowling
        run: dotnet test Bowling.Tests/Bowling.Tests.csproj --configuration Release --no-restore --verbosity normal
        
      - name: Test ConnectFour
        run: dotnet test ConnectFour.Tests/ConnectFour.Tests.csproj --configuration Release --no-restore --verbosity normal
        
  format:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/dotnet-setup
        
      - name: Format
        run: dotnet format CSharpTesting.slnx --verify-no-changes --no-restore
        continue-on-error: true

  release:
    runs-on: ubuntu-latest
    needs: [ build, test ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/dotnet-setup

      - name: Publish ConnectFour (Linux)
        run: |
          dotnet publish ConnectFour/ConnectFour.csproj \
            --configuration Release \
            --runtime linux-x64 --self-contained \
            --output artifacts/publish/linux-x64

      - name: Publish ConnectFour (Windows)
        run: |
          dotnet publish ConnectFour/ConnectFour.csproj \
            --configuration Release \
            --runtime win-x64 --self-contained \
            --output artifacts/publish/win-x64

      - name: Publish ConnectFour (macOS)
        run: |
          dotnet publish ConnectFour/ConnectFour.csproj \
            --configuration Release \
            --runtime osx-x64 --self-contained \
            --output artifacts/publish/osx-x64

      - name: Create release archives
        run: |
          cd artifacts/publish/linux-x64 && zip -r ../../../ConnectFour-linux-x64.zip . && cd ../../..
          cd artifacts/publish/win-x64 && zip -r ../../../ConnectFour-win-x64.zip . && cd ../../..
          cd artifacts/publish/osx-x64 && zip -r ../../../ConnectFour-osx-x64.zip . && cd ../../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            ConnectFour-linux-x64.zip
            ConnectFour-win-x64.zip
            ConnectFour-osx-x64.zip